name: Bootstrap MoeBot Group 7 Source

"on":
  push:
    branches:
      - agent/group7-v075-annual-closure
    paths:
      - ".github/workflows/bootstrap-moebot-group7-source.yml"
      - "MoeBot_Trading_System/Group_7_bootstrap/chunks/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expand-source:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/group7-v075-annual-closure
          fetch-depth: 0
      - name: Reassemble and verify Group 7 source package
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import hashlib
          import tarfile
          from pathlib import Path

          chunks = sorted(Path("MoeBot_Trading_System/Group_7_bootstrap/chunks").glob("part_*.b64"))
          expected = [f"part_{i:03d}.b64" for i in range(5)]
          actual = [p.name for p in chunks]
          if actual != expected:
              raise SystemExit(f"Incomplete bootstrap chunks: expected={expected}, actual={actual}")
          encoded = "".join(
              "".join(line.strip() for line in p.read_text(encoding="utf-8").splitlines() if line and not line.startswith("#"))
              for p in chunks
          )
          payload = base64.b64decode(encoded, validate=True)
          actual_sha = hashlib.sha256(payload).hexdigest()
          expected_sha = "70d58ca90a00297ee4e65b5c39e943ecc27b958b3a65877c144210df9b2e022e"
          if actual_sha != expected_sha:
              raise SystemExit(f"Bootstrap SHA-256 mismatch: {actual_sha}")
          archive = Path("/tmp/group7_source_bundle.tar.gz")
          archive.write_bytes(payload)
          with tarfile.open(archive, "r:gz") as tf:
              root = Path.cwd().resolve()
              for member in tf.getmembers():
                  target = (root / member.name).resolve()
                  if root not in target.parents and target != root:
                      raise SystemExit(f"Unsafe archive member: {member.name}")
              tf.extractall(root)
          print(f"PASS: restored Group 7 source package {actual_sha}")
          PY
      - name: Verify restored package
        shell: bash
        env:
          RUNNER_TEMP_PATH: ${{ runner.temp }}
        run: |
          python -m compileall -q MoeBot_Trading_System/Group_7/code
          python MoeBot_Trading_System/Group_7/code/group7_test_suite.py \
            --workdir "$RUNNER_TEMP/group7-bootstrap-test" \
            --json-out "$RUNNER_TEMP/group7-bootstrap-test.json"
          python MoeBot_Trading_System/Group_7/code/group7_independent_audit.py \
            --db "$RUNNER_TEMP/group7-bootstrap-test/group7.sqlite" \
            --source "$RUNNER_TEMP/group7-bootstrap-test/source.sqlite" \
            --group6 "$RUNNER_TEMP/group7-bootstrap-test/group6.sqlite" \
            --json-out "$RUNNER_TEMP/group7-bootstrap-audit.json"
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          root = Path(os.environ["RUNNER_TEMP_PATH"])
          tests = json.loads((root / "group7-bootstrap-test.json").read_text())
          audit = json.loads((root / "group7-bootstrap-audit.json").read_text())
          if tests.get("passed") is not True or tests.get("passed_count") != 47:
              raise SystemExit(f"Group 7 tests failed: {tests}")
          if audit.get("passed") is not True:
              raise SystemExit(f"Group 7 audit failed: {audit}")
          print("PASS: 47/47 tests and independent audit")
          PY
      - name: Commit restored Group 7 source without workflow mutation
        shell: bash
        run: |
          rm -rf MoeBot_Trading_System/Group_7_bootstrap
          rm -f .github/workflows/build-moebot-group7.yml
          find MoeBot_Trading_System/Group_7 -type d -name __pycache__ -prune -exec rm -rf {} +
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MoeBot_Trading_System/Group_7
          git add -u MoeBot_Trading_System/Group_7_bootstrap
          git commit -m "Add MoeBot Group 7 v0.7.5 annual closure package"
          git push origin HEAD:agent/group7-v075-annual-closure
