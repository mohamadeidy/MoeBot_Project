name: MoeBot Group 8 Dependency Intake

"on":
  push:
    branches:
      - main
    paths:
      - "MoeBot_Trading_System/Group_8/code/group8_dependency_intake.py"
      - "MoeBot_Trading_System/archive/groups_2_6_frozen_runtime_bundle/**"
      - ".github/workflows/moebot-group8-dependency-intake.yml"
  workflow_dispatch:

permissions:
  contents: write

env:
  GROUP8_ROOT: MoeBot_Trading_System/Group_8
  BUNDLE_ROOT: MoeBot_Trading_System/archive/groups_2_6_frozen_runtime_bundle
  PYTHONUNBUFFERED: "1"

jobs:
  dependency-intake:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Install archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
      - name: Restore frozen runtime bundle and inventory schemas
        run: |
          rm -rf "$RUNNER_TEMP/moebot-groups2-6"
          python "$BUNDLE_ROOT/restore_bundle.py" \
            --output "$RUNNER_TEMP/MoeBot_Groups2-6_Frozen_Runtime_Sources.tar.zst" \
            --extract-to "$RUNNER_TEMP/moebot-groups2-6"
          python "$GROUP8_ROOT/code/group8_dependency_intake.py" \
            --restored-root "$RUNNER_TEMP/moebot-groups2-6" \
            --output "$GROUP8_ROOT/reports/02_FROZEN_RUNTIME_SCHEMA_INVENTORY.json"
      - name: Commit dependency inventory
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$GROUP8_ROOT/reports/02_FROZEN_RUNTIME_SCHEMA_INVENTORY.json"
          if ! git diff --cached --quiet; then
            git commit -m "Inventory Group 8 frozen upstream schemas [skip actions]"
            git pull --rebase origin main
            git push origin main
          fi
