name: MoeBot Group 8 Dependency Intake

"on":
  push:
    branches:
      - main
    paths:
      - "MoeBot_Trading_System/Group_8/code/group8_dependency_intake.py"
      - "MoeBot_Trading_System/Group_8/code/group8_real_schema_intake.py"
      - "MoeBot_Trading_System/Group_8/code/group8_bundle_diagnostic.py"
      - "MoeBot_Trading_System/archive/groups_2_6_frozen_runtime_bundle/**"
      - ".github/workflows/moebot-group8-dependency-intake.yml"
  pull_request:
    branches:
      - main
    paths:
      - "MoeBot_Trading_System/Group_8/TRIGGER_DEPENDENCY_INTAKE.txt"
  workflow_dispatch:

permissions:
  contents: write

env:
  GROUP8_ROOT: MoeBot_Trading_System/Group_8
  BUNDLE_ROOT: MoeBot_Trading_System/archive/groups_2_6_frozen_runtime_bundle
  CLOSURE_TAG: moebot-group7-v0.7.5-closure
  CLOSURE_SHA: c9a481d5d8f40bc80d833ef1d135fe56578b5fe2
  GROUP7_2023_URL: https://github.com/mohamadeidy/MoeBot_Project/releases/download/moebot-group7-v0.7.5/MoeBot_Group7_XAUUSD_2023_v0.7.5_rebuilt_dukascopy_v1.sqlite.zst.part-000
  GROUP7_2023_COMPRESSED_SHA: 64920a85644a37796d312ff280866c44d711eab0586d1346683d279f2228abab
  GROUP7_2023_DB_SHA: bcd550cca8a9131efa17d3cd4323aa47467172222756edc9c765bfacc5468af7
  GROUP7_2023_DB_SIZE: "8115417088"
  PYTHONUNBUFFERED: "1"

jobs:
  dependency-intake:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Verify immutable Group 7 closure reference
        run: |
          git fetch --tags --force origin
          ACTUAL="$(git rev-parse "${CLOSURE_TAG}^{commit}")"
          test "$ACTUAL" = "$CLOSURE_SHA"
          git diff --quiet "$CLOSURE_SHA" "$CLOSURE_TAG"

      - name: Install archive tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Restore missing archival runtime chunk
        run: |
          CHUNKS_DIR="$BUNDLE_ROOT/chunks"
          mkdir -p "$CHUNKS_DIR"
          git show b58a79cff032d98dd7c60104b997ee7a1da7001a:"$CHUNKS_DIR/part_002.b64" > "$CHUNKS_DIR/part_002.b64"
          test -s "$CHUNKS_DIR/part_002.b64"
          echo "1cb9c17f544abf4e1643fce32d7a24b5f81a71cf4605646663a5b331a3893d38  $CHUNKS_DIR/part_002.b64" | sha256sum -c -

      - name: Diagnose frozen Groups 2-6 runtime bundle
        run: |
          python "$GROUP8_ROOT/code/group8_bundle_diagnostic.py" \
            --bundle-root "$BUNDLE_ROOT" \
            --output "$GROUP8_ROOT/reports/00_BUNDLE_DIAGNOSTIC.json"

      - name: Upload bundle diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: group8-bundle-diagnostic
          path: ${{ env.GROUP8_ROOT }}/reports/00_BUNDLE_DIAGNOSTIC.json
          retention-days: 7

      - name: Restore exact Groups 2-6 runtime and inventory static schemas
        run: |
          rm -rf "$RUNNER_TEMP/moebot-groups2-6"
          python "$BUNDLE_ROOT/restore_bundle.py" \
            --output "$RUNNER_TEMP/MoeBot_Groups2-6_Frozen_Runtime_Sources.tar.zst" \
            --extract-to "$RUNNER_TEMP/moebot-groups2-6"
          python "$GROUP8_ROOT/code/group8_dependency_intake.py" \
            --restored-root "$RUNNER_TEMP/moebot-groups2-6" \
            --output "$GROUP8_ROOT/reports/02_FROZEN_RUNTIME_SCHEMA_INVENTORY.json"

      - name: Download and verify real Group 7 2023 database
        run: |
          COMPRESSED="$RUNNER_TEMP/group7_2023.sqlite.zst"
          DATABASE="$RUNNER_TEMP/group7_2023.sqlite"
          curl -L --fail --retry 5 --retry-all-errors "$GROUP7_2023_URL" -o "$COMPRESSED"
          echo "$GROUP7_2023_COMPRESSED_SHA  $COMPRESSED" | sha256sum -c -
          zstd -d -f "$COMPRESSED" -o "$DATABASE"
          rm -f "$COMPRESSED"
          python "$GROUP8_ROOT/code/group8_real_schema_intake.py" \
            --database "$DATABASE" \
            --expected-sha256 "$GROUP7_2023_DB_SHA" \
            --expected-size "$GROUP7_2023_DB_SIZE" \
            --year 2023 \
            --output "$GROUP8_ROOT/reports/03_REAL_SQLITE_SCHEMA_INVENTORY_2023.json"
          rm -f "$DATABASE"

      - name: Finalize dependency intake status
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          root = Path("MoeBot_Trading_System/Group_8")
          static = json.loads((root / "reports/02_FROZEN_RUNTIME_SCHEMA_INVENTORY.json").read_text())
          real = json.loads((root / "reports/03_REAL_SQLITE_SCHEMA_INVENTORY_2023.json").read_text())
          diagnostic = json.loads((root / "reports/00_BUNDLE_DIAGNOSTIC.json").read_text())
          if diagnostic["status"] != "pass" or static["status"] != "pass" or real["status"] != "pass":
              raise SystemExit("dependency intake failed")
          status_path = root / "STATUS.json"
          status = json.loads(status_path.read_text())
          status["dependency_intake"] = {
              "closure_reference": "PASS",
              "closure_tag": "moebot-group7-v0.7.5-closure",
              "closure_commit_sha": "c9a481d5d8f40bc80d833ef1d135fe56578b5fe2",
              "data_release_sha256": "PASS",
              "repository_dependency_sha256": "PASS",
              "sqlite_integrity": "PASS",
              "frozen_runtime_bundle_identity": "PASS",
              "frozen_runtime_schema_inventory": "PASS",
              "real_sqlite_schema_inventory": "PASS",
              "verdict": "PASS"
          }
          status["engine_build_authorized"] = True
          status["status"] = "DEPENDENCY_INTAKE_PASS_DESIGN_FREEZE_PENDING"
          status_path.write_text(json.dumps(status, indent=2, sort_keys=True) + "\n")
          PY

      - name: Upload dependency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: group8-dependency-intake
          path: |
            ${{ env.GROUP8_ROOT }}/reports/00_BUNDLE_DIAGNOSTIC.json
            ${{ env.GROUP8_ROOT }}/reports/02_FROZEN_RUNTIME_SCHEMA_INVENTORY.json
            ${{ env.GROUP8_ROOT }}/reports/03_REAL_SQLITE_SCHEMA_INVENTORY_2023.json
            ${{ env.GROUP8_ROOT }}/STATUS.json
          if-no-files-found: warn
          retention-days: 7

      - name: Commit verified dependency intake
        if: github.event_name != 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            "$GROUP8_ROOT/reports/00_BUNDLE_DIAGNOSTIC.json" \
            "$GROUP8_ROOT/reports/02_FROZEN_RUNTIME_SCHEMA_INVENTORY.json" \
            "$GROUP8_ROOT/reports/03_REAL_SQLITE_SCHEMA_INVENTORY_2023.json" \
            "$GROUP8_ROOT/STATUS.json"
          if ! git diff --cached --quiet; then
            git commit -m "Verify Group 8 dependency intake [skip actions]"
            git pull --rebase origin main
            git push origin main
          fi