name: Build and Close MoeBot Group 7

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-moebot-group7.yml"
      - "MoeBot_Trading_System/Group_7/code/**"
      - "MoeBot_Trading_System/Group_7/00_DESIGN_LOCK.md"
      - "MoeBot_Trading_System/Group_7/FROZEN_CONFIG_REGISTRY.json"
      - "MoeBot_Trading_System/Group_7/ANNUAL_DEPENDENCY_REQUIREMENTS.json"

permissions:
  contents: write

env:
  GROUP7_ROOT: MoeBot_Trading_System/Group_7
  UPSTREAM_REGISTRY: MoeBot_Trading_System/Data_Vault/registry/DATABASE_REGISTRY.json
  RELEASE_TAG: moebot-group7-v0.7.5
  PYTHONUNBUFFERED: "1"

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python requirements
        run: pip install -r "$GROUP7_ROOT/requirements.txt"
      - name: Run 47-test causal contract suite
        run: |
          mkdir -p "$RUNNER_TEMP/g7_preflight"
          python "$GROUP7_ROOT/code/group7_test_suite.py" \
            --workdir "$RUNNER_TEMP/g7_preflight/synthetic" \
            --json-out "$RUNNER_TEMP/g7_preflight/SYNTHETIC_V075.json"
      - name: Run independent synthetic audit
        run: |
          python "$GROUP7_ROOT/code/group7_independent_audit.py" \
            --db "$RUNNER_TEMP/g7_preflight/synthetic/group7.sqlite" \
            --json-out "$RUNNER_TEMP/g7_preflight/INDEPENDENT_AUDIT_SYNTHETIC.json"
      - name: Run indexed lifecycle performance smoke
        run: |
          python "$GROUP7_ROOT/code/group7_performance_smoke.py" \
            --zones 20000 --bars 5000 \
            --json-out "$RUNNER_TEMP/g7_preflight/PERFORMANCE_SMOKE.json"
      - uses: actions/upload-artifact@v4
        with:
          name: group7-preflight-evidence
          path: ${{ runner.temp }}/g7_preflight/*.json
          retention-days: 30

  build-year:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        year: [2023, 2024]
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system and Python requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
          pip install -r "$GROUP7_ROOT/requirements.txt"
      - name: Restore published upstream source and Group 6 databases
        run: |
          python MoeBot_Trading_System/Data_Vault/download_and_restore_databases.py \
            --registry "$UPSTREAM_REGISTRY" \
            --year "${{ matrix.year }}" \
            --download-dir "$RUNNER_TEMP/upstream_downloads/${{ matrix.year }}" \
            --output-dir "$RUNNER_TEMP/upstream/${{ matrix.year }}"
      - name: Resolve annual dependency filenames
        id: names
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os
          year = "${{ matrix.year }}"
          req = json.load(open(os.environ["GROUP7_ROOT"] + "/ANNUAL_DEPENDENCY_REQUIREMENTS.json"))
          print("source=" + req[year]["source"]["filename"])
          print("group6=" + req[year]["group6"]["filename"])
          PY
      - name: Build and audit frozen Group 7 annual database
        run: |
          mkdir -p "$RUNNER_TEMP/g7_build/${{ matrix.year }}"
          python "$GROUP7_ROOT/code/group7_year_pipeline.py" \
            --year "${{ matrix.year }}" \
            --source "$RUNNER_TEMP/upstream/${{ matrix.year }}/${{ steps.names.outputs.source }}" \
            --group6 "$RUNNER_TEMP/upstream/${{ matrix.year }}/${{ steps.names.outputs.group6 }}" \
            --outdir "$RUNNER_TEMP/g7_build/${{ matrix.year }}"
      - name: Package and split Group 7 database
        id: package
        shell: bash
        run: |
          DB=$(find "$RUNNER_TEMP/g7_build/${{ matrix.year }}" -maxdepth 1 -name 'MoeBot_Group7_*.sqlite' -print -quit)
          VERIFY="$RUNNER_TEMP/g7_build/${{ matrix.year }}/GROUP7_YEAR_${{ matrix.year }}.json"
          mkdir -p "$RUNNER_TEMP/g7_release/${{ matrix.year }}"
          python "$GROUP7_ROOT/code/package_group7_database.py" \
            --year "${{ matrix.year }}" \
            --db "$DB" \
            --verification "$VERIFY" \
            --output-dir "$RUNNER_TEMP/g7_release/${{ matrix.year }}" \
            --repository "$GITHUB_REPOSITORY" \
            --tag "$RELEASE_TAG"
          cp "$RUNNER_TEMP/g7_build/${{ matrix.year }}/GROUP7_YEAR_${{ matrix.year }}.json" "$RUNNER_TEMP/g7_release/${{ matrix.year }}/"
          cp "$RUNNER_TEMP/g7_build/${{ matrix.year }}/GROUP7_YEAR_${{ matrix.year }}.md" "$RUNNER_TEMP/g7_release/${{ matrix.year }}/"
          tar -czf "$RUNNER_TEMP/g7_release/${{ matrix.year }}/GROUP7_VISUAL_AUDIT_${{ matrix.year }}.tar.gz" \
            -C "$RUNNER_TEMP/g7_build/${{ matrix.year }}" "visual_audit_${{ matrix.year }}"
      - name: Ensure public Group 7 Release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
              --title "MoeBot Group 7 v0.7.5 Frozen Annual Data" \
              --notes "Causal Group 7 Blocks and Institutional Zones annual databases. Immutable candidates, separate definition matches, no backdating, no trading signals. Upstream lineage: dukascopy_rebuild_v1." \
              || gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null
          fi
      - name: Upload annual database parts and evidence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" \
            "$RUNNER_TEMP/g7_release/${{ matrix.year }}"/* --clobber
      - uses: actions/upload-artifact@v4
        with:
          name: group7-manifest-${{ matrix.year }}
          path: |
            ${{ runner.temp }}/g7_release/${{ matrix.year }}/GROUP7_MANIFEST_${{ matrix.year }}.json
            ${{ runner.temp }}/g7_build/${{ matrix.year }}/GROUP7_YEAR_${{ matrix.year }}.json
            ${{ runner.temp }}/g7_build/${{ matrix.year }}/GROUP7_YEAR_${{ matrix.year }}.md
          retention-days: 30
      - name: Remove annual large files
        if: always()
        run: rm -rf "$RUNNER_TEMP/upstream" "$RUNNER_TEMP/upstream_downloads" "$RUNNER_TEMP/g7_build" "$RUNNER_TEMP/g7_release" || true

  finalize-registry:
    needs: build-year
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/download-artifact@v4
        with:
          pattern: group7-manifest-*
          path: "$RUNNER_TEMP/group7_manifests"
      - name: Build cross-year validation and permanent registry
        run: |
          mkdir -p "$RUNNER_TEMP/group7_registry"
          python "$GROUP7_ROOT/code/build_group7_registry.py" \
            --manifests-dir "$RUNNER_TEMP/group7_manifests" \
            --output-dir "$RUNNER_TEMP/group7_registry"
          mkdir -p "$GROUP7_ROOT/registry" "$GROUP7_ROOT/reports"
          cp "$RUNNER_TEMP/group7_registry/GROUP7_DATABASE_REGISTRY.json" "$GROUP7_ROOT/registry/"
          cp "$RUNNER_TEMP/group7_registry/10_CROSS_YEAR_VALIDATION.json" "$GROUP7_ROOT/reports/"
          cp "$RUNNER_TEMP/group7_registry/STATUS.json" "$GROUP7_ROOT/STATUS.json"
          find "$RUNNER_TEMP/group7_manifests" -name 'GROUP7_YEAR_*.json' -exec cp {} "$GROUP7_ROOT/reports/" \;
          find "$RUNNER_TEMP/group7_manifests" -name 'GROUP7_YEAR_*.md' -exec cp {} "$GROUP7_ROOT/reports/" \;
      - name: Commit annual registry and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$GROUP7_ROOT/registry" "$GROUP7_ROOT/reports" "$GROUP7_ROOT/STATUS.json"
          if ! git diff --cached --quiet; then
            git commit -m "Publish MoeBot Group 7 annual registry"
            git pull --rebase origin main
            git push origin main
          fi

  clean-room-verify-and-close:
    needs: finalize-registry
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install system and Python requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
          pip install -r "$GROUP7_ROOT/requirements.txt"
      - name: Restore upstream and Group 7 from public Releases only
        run: |
          rm -rf "$RUNNER_TEMP/g7_cleanroom"
          mkdir -p "$RUNNER_TEMP/g7_cleanroom"
          python MoeBot_Trading_System/Data_Vault/download_and_restore_databases.py \
            --registry "$UPSTREAM_REGISTRY" --year both \
            --download-dir "$RUNNER_TEMP/g7_cleanroom/upstream_downloads" \
            --output-dir "$RUNNER_TEMP/g7_cleanroom/upstream"
          python "$GROUP7_ROOT/code/download_and_restore_group7.py" \
            --registry "$GROUP7_ROOT/registry/GROUP7_DATABASE_REGISTRY.json" --year both \
            --download-dir "$RUNNER_TEMP/g7_cleanroom/group7_downloads" \
            --output-dir "$RUNNER_TEMP/g7_cleanroom/group7"
      - name: Run independent audits on restored annual databases
        run: |
          python "$GROUP7_ROOT/code/group7_independent_audit.py" \
            --db "$RUNNER_TEMP/g7_cleanroom/group7/MoeBot_Group7_XAUUSD_2023_v0.7.5_rebuilt_dukascopy_v1.sqlite" \
            --source "$RUNNER_TEMP/g7_cleanroom/upstream/source_2023_rebuilt_dukascopy_v1.sqlite" \
            --group6 "$RUNNER_TEMP/g7_cleanroom/upstream/MoeBot_Group6_XAUUSD_2023_v0.6.4_rebuilt_dukascopy_v1.sqlite" \
            --json-out "$RUNNER_TEMP/g7_cleanroom/AUDIT_2023.json"
          python "$GROUP7_ROOT/code/group7_independent_audit.py" \
            --db "$RUNNER_TEMP/g7_cleanroom/group7/MoeBot_Group7_XAUUSD_2024_v0.7.5_rebuilt_dukascopy_v1.sqlite" \
            --source "$RUNNER_TEMP/g7_cleanroom/upstream/source_2024_canonical_rebuilt_dukascopy_v1.sqlite" \
            --group6 "$RUNNER_TEMP/g7_cleanroom/upstream/MoeBot_Group6_XAUUSD_2024_v0.6.4_rebuilt_dukascopy_v1.sqlite" \
            --json-out "$RUNNER_TEMP/g7_cleanroom/AUDIT_2024.json"
      - name: Produce clean-room closure evidence
        env:
          CLEAN_ROOT: ${{ runner.temp }}/g7_cleanroom
        run: |
          python - <<'PY'
          import datetime as dt, hashlib, json, os, sqlite3
          from pathlib import Path
          root=Path(os.environ['CLEAN_ROOT'])
          registry=json.load(open('MoeBot_Trading_System/Group_7/registry/GROUP7_DATABASE_REGISTRY.json'))
          audits={y:json.load(open(root/f'AUDIT_{y}.json')) for y in ('2023','2024')}
          verified={}
          for y,entry in registry['years'].items():
              db=root/'group7'/entry['database_filename']
              h=hashlib.sha256()
              with db.open('rb') as f:
                  while chunk:=f.read(8*1024*1024):h.update(chunk)
              con=sqlite3.connect(f'file:{db}?mode=ro',uri=True)
              quick=con.execute('PRAGMA quick_check').fetchone()[0]
              integrity=con.execute('PRAGMA integrity_check').fetchone()[0]
              fk=len(con.execute('PRAGMA foreign_key_check').fetchall())
              con.close()
              ok=(db.stat().st_size==entry['database_size_bytes'] and h.hexdigest()==entry['database_sha256'] and quick=='ok' and integrity=='ok' and fk==0 and audits[y]['passed'])
              if not ok: raise SystemExit(f'Clean-room verification failed for {y}')
              verified[y]={'filename':db.name,'size_bytes':db.stat().st_size,'sha256':h.hexdigest(),'quick_check':quick,'integrity_check':integrity,'foreign_key_errors':fk,'independent_audit':audits[y]['passed']}
          report={'format_version':1,'status':'pass','verified_at_utc':dt.datetime.now(dt.timezone.utc).isoformat(),'method':'public Release download, part and stream SHA-256, zstd decompression, extracted SHA-256/size, SQLite quick/integrity/foreign-key checks, and independent causal audit','years':verified}
          out=Path('MoeBot_Trading_System/Group_7/registry/CLEAN_ROOM_VERIFICATION.json')
          out.write_text(json.dumps(report,indent=2,sort_keys=True)+'\n')
          PY
          python "$GROUP7_ROOT/code/finalize_group7_closure.py" \
            --registry "$GROUP7_ROOT/registry/GROUP7_DATABASE_REGISTRY.json" \
            --clean-room-report "$GROUP7_ROOT/registry/CLEAN_ROOM_VERIFICATION.json" \
            --output-dir "$GROUP7_ROOT"
          python - <<'PY'
          import json
          p='MoeBot_Trading_System/Group_7/registry/GROUP7_DATABASE_REGISTRY.json'
          r=json.load(open(p));r['status']='published_verified_officially_closed'
          open(p,'w').write(json.dumps(r,indent=2,sort_keys=True)+'\n')
          PY
      - name: Commit official closure and future-group handoff
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$GROUP7_ROOT/registry" "$GROUP7_ROOT/STATUS.json" "$GROUP7_ROOT/NEXT_GROUP_DEPENDENCY_MANIFEST.json" "$GROUP7_ROOT/11_FINAL_VERDICT.md"
          git commit -m "Group 7 officially closed"
          git pull --rebase origin main
          git push origin main
      - name: Remove clean-room databases
        if: always()
        run: rm -rf "$RUNNER_TEMP/g7_cleanroom" || true
