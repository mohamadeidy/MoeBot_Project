name: Trigger MoeBot SQLite Vault Build

"on":
  push:
    branches:
      - main
    paths:
      - ".github/workflows/trigger-moebot-sqlite-vault.yml"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  trigger-public-vault-build:
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch annual SQLite vault build
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-moebot-sqlite-vault.yml --ref main
