name: Verify MoeBot Group 7 Final Published State

"on":
  push:
    branches:
      - main
    paths:
      - "MoeBot_Trading_System/Group_7/STATUS.json"
      - "MoeBot_Trading_System/Group_7/NEXT_GROUP_DEPENDENCY_MANIFEST.json"
      - "MoeBot_Trading_System/Group_7/11_FINAL_VERDICT.md"
      - "MoeBot_Trading_System/Group_7/registry/**"
  workflow_dispatch:

permissions:
  contents: write

env:
  GROUP7_ROOT: MoeBot_Trading_System/Group_7
  PYTHONUNBUFFERED: "1"
  EXPECTED_CLOSURE_TAG: moebot-group7-v0.7.5-closure
  EXPECTED_CLOSURE_COMMIT_SHA: c9a481d5d8f40bc80d833ef1d135fe56578b5fe2

jobs:
  verify-final-state:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Detect official closure
        id: closure
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          status_path = Path('MoeBot_Trading_System/Group_7/STATUS.json')
          status = json.loads(status_path.read_text()) if status_path.exists() else {}
          closed = status.get('officially_closed') is True and status.get('group8_authorized') is True
          print('closed=' + ('true' if closed else 'false'))
          PY
      - name: Set and verify closure freeze reference
        if: steps.closure.outputs.closed == 'true'
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          root = Path('MoeBot_Trading_System/Group_7')
          closure_tag = os.environ['EXPECTED_CLOSURE_TAG']
          closure_sha = os.environ['EXPECTED_CLOSURE_COMMIT_SHA']
          handoff_path = root / 'NEXT_GROUP_DEPENDENCY_MANIFEST.json'
          status_path = root / 'STATUS.json'
          handoff = json.loads(handoff_path.read_text())
          status = json.loads(status_path.read_text())
          handoff['data_release_tag'] = 'moebot-group7-v0.7.5'
          handoff['closure_tag'] = closure_tag
          handoff['closure_commit_sha'] = closure_sha
          handoff['release_tag'] = handoff['data_release_tag']
          status['data_release_tag'] = 'moebot-group7-v0.7.5'
          status['closure_tag'] = closure_tag
          status['closure_commit_sha'] = closure_sha
          status['release_tag'] = status['data_release_tag']
          handoff_path.write_text(json.dumps(handoff, indent=2, sort_keys=True) + '\n')
          status_path.write_text(json.dumps(status, indent=2, sort_keys=True) + '\n')
          PY
          git cat-file -e "$EXPECTED_CLOSURE_COMMIT_SHA^{commit}"
          git merge-base --is-ancestor "$EXPECTED_CLOSURE_COMMIT_SHA" HEAD
          git fetch --tags --force origin
          if git show-ref --verify --quiet "refs/tags/$EXPECTED_CLOSURE_TAG"; then
            actual="$(git rev-parse "refs/tags/$EXPECTED_CLOSURE_TAG^{commit}")"
            test "$actual" = "$EXPECTED_CLOSURE_COMMIT_SHA"
          else
            git tag "$EXPECTED_CLOSURE_TAG" "$EXPECTED_CLOSURE_COMMIT_SHA"
            git push origin "refs/tags/$EXPECTED_CLOSURE_TAG"
          fi
          actual="$(git rev-parse "refs/tags/$EXPECTED_CLOSURE_TAG^{commit}")"
          test "$actual" = "$EXPECTED_CLOSURE_COMMIT_SHA"
      - name: Install verification tools
        if: steps.closure.outputs.closed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd
          pip install -r "$GROUP7_ROOT/requirements.txt"
      - name: Verify closure tag, commit and repository dependency identities
        if: steps.closure.outputs.closed == 'true'
        run: |
          git log --format=%s --all | grep -Fx "Group 7 officially closed"
          python - <<'PY'
          import hashlib, json, os, subprocess
          from pathlib import Path
          root = Path('MoeBot_Trading_System/Group_7')
          handoff = json.loads((root / 'NEXT_GROUP_DEPENDENCY_MANIFEST.json').read_text())
          assert handoff['officially_closed'] is True
          assert handoff['group8_authorized'] is True
          assert handoff['status'] == 'frozen_read_only_dependency'
          assert handoff['data_release_tag'] == 'moebot-group7-v0.7.5'
          assert handoff['closure_tag'] == os.environ['EXPECTED_CLOSURE_TAG']
          assert handoff['closure_commit_sha'] == os.environ['EXPECTED_CLOSURE_COMMIT_SHA']
          actual = subprocess.check_output(
              ['git', 'rev-parse', f"refs/tags/{handoff['closure_tag']}^{{commit}}"], text=True
          ).strip()
          assert actual == handoff['closure_commit_sha']
          failures = []
          for relative, identity in sorted(handoff['repository_files'].items()):
              path = root / relative
              if not path.is_file():
                  failures.append(f'missing:{relative}')
                  continue
              digest = hashlib.sha256()
              with path.open('rb') as handle:
                  while chunk := handle.read(8 * 1024 * 1024):
                      digest.update(chunk)
              if path.stat().st_size != identity['size_bytes']:
                  failures.append(f'size:{relative}')
              if digest.hexdigest() != identity['sha256']:
                  failures.append(f'sha256:{relative}')
          if failures:
              raise SystemExit('Repository dependency verification failed: ' + ', '.join(failures))
          print(f"PASS: closure tag plus {len(handoff['repository_files'])} repository dependency identities")
          PY
      - name: Restore Group 7 databases from final public Release
        if: steps.closure.outputs.closed == 'true'
        run: |
          rm -rf "$RUNNER_TEMP/group7-final-verification"
          mkdir -p "$RUNNER_TEMP/group7-final-verification"
          python "$GROUP7_ROOT/code/download_and_restore_group7.py" \
            --registry "$GROUP7_ROOT/registry/GROUP7_DATABASE_REGISTRY.json" \
            --year both \
            --download-dir "$RUNNER_TEMP/group7-final-verification/downloads" \
            --output-dir "$RUNNER_TEMP/group7-final-verification/databases" \
            | tee "$RUNNER_TEMP/group7-final-verification/restore.json"
      - name: Write post-closure verification evidence
        if: steps.closure.outputs.closed == 'true'
        env:
          VERIFY_ROOT: ${{ runner.temp }}/group7-final-verification
        run: |
          python - <<'PY'
          import datetime as dt, json, os, subprocess
          from pathlib import Path
          root = Path('MoeBot_Trading_System/Group_7')
          runtime = Path(os.environ['VERIFY_ROOT'])
          handoff = json.loads((root / 'NEXT_GROUP_DEPENDENCY_MANIFEST.json').read_text())
          registry = json.loads((root / 'registry/GROUP7_DATABASE_REGISTRY.json').read_text())
          restored = json.loads((runtime / 'restore.json').read_text())
          actual_tag_sha = subprocess.check_output(
              ['git', 'rev-parse', f"refs/tags/{handoff['closure_tag']}^{{commit}}"], text=True
          ).strip()
          if actual_tag_sha != handoff['closure_commit_sha']:
              raise SystemExit('Closure tag target mismatch')
          years = {}
          for year in ('2023', '2024'):
              expected = registry['years'][year]
              actual = restored['restored'][year]
              if actual['filename'] != expected['database_filename']:
                  raise SystemExit(f'Filename mismatch for {year}')
              if actual['size_bytes'] != expected['database_size_bytes']:
                  raise SystemExit(f'Size mismatch for {year}')
              if actual['sha256'] != expected['database_sha256']:
                  raise SystemExit(f'SHA-256 mismatch for {year}')
              if actual['quick_check'] != 'ok' or actual['integrity_check'] != 'ok' or actual['foreign_key_errors'] != 0:
                  raise SystemExit(f'SQLite check failed for {year}')
              years[year] = actual
          report = {
              'format_version': 2,
              'status': 'pass',
              'verified_at_utc': dt.datetime.now(dt.timezone.utc).isoformat(),
              'data_release_tag': handoff['data_release_tag'],
              'closure_tag': handoff['closure_tag'],
              'closure_commit_sha': handoff['closure_commit_sha'],
              'closure_tag_target_verified': True,
              'registry_status': registry['status'],
              'handoff_format_version': handoff['format_version'],
              'repository_file_count': len(handoff['repository_files']),
              'repository_sha256_status': 'pass',
              'years': years,
              'method': 'closure-tag verification plus public data-release restore, repository-file SHA-256, database SHA-256, SQLite integrity and foreign-key verification',
          }
          output = root / 'registry/POST_CLOSURE_VERIFICATION.json'
          output.write_text(json.dumps(report, indent=2, sort_keys=True) + '\n')
          print(json.dumps(report, indent=2, sort_keys=True))
          PY
      - name: Commit final freeze-reference verification
        if: steps.closure.outputs.closed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$GROUP7_ROOT/STATUS.json" \
                  "$GROUP7_ROOT/NEXT_GROUP_DEPENDENCY_MANIFEST.json" \
                  "$GROUP7_ROOT/registry/POST_CLOSURE_VERIFICATION.json"
          if ! git diff --cached --quiet; then
            git commit -m "Verify Group 7 closure freeze reference [skip actions]"
            git pull --rebase origin main
            git push origin main
          fi
      - name: Skip until official closure
        if: steps.closure.outputs.closed != 'true'
        run: echo "Group 7 is not officially closed yet; final-state verification is deferred."
      - name: Remove restored databases
        if: always()
        run: rm -rf "$RUNNER_TEMP/group7-final-verification" || true
