name: Verify MoeBot SQLite Data Vault Clean Room

"on":
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/verify-moebot-sqlite-vault.yml"

permissions:
  contents: write

jobs:
  clean-room-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Zstandard
        run: |
          sudo apt-get update
          sudo apt-get install -y zstd

      - name: Restore all published databases from public Release assets
        run: |
          rm -rf "$RUNNER_TEMP/moebot-clean-room"
          mkdir -p "$RUNNER_TEMP/moebot-clean-room"
          python MoeBot_Trading_System/Data_Vault/download_and_restore_databases.py \
            --registry MoeBot_Trading_System/Data_Vault/registry/DATABASE_REGISTRY.json \
            --year both \
            --download-dir "$RUNNER_TEMP/moebot-clean-room/downloads" \
            --output-dir "$RUNNER_TEMP/moebot-clean-room/databases" \
            | tee "$RUNNER_TEMP/moebot-clean-room/restore-output.json"

      - name: Produce clean-room verification evidence
        env:
          CLEAN_ROOM_ROOT: ${{ runner.temp }}/moebot-clean-room
        run: |
          python - <<'PY'
          import datetime as dt
          import json
          import os
          from pathlib import Path

          root = Path(os.environ["CLEAN_ROOM_ROOT"])
          registry_path = Path("MoeBot_Trading_System/Data_Vault/registry/DATABASE_REGISTRY.json")
          registry = json.loads(registry_path.read_text(encoding="utf-8"))
          restore_output = json.loads((root / "restore-output.json").read_text(encoding="utf-8"))

          verified = {}
          for year, year_entry in sorted(registry["years"].items()):
              verified[year] = {}
              restored_year = restore_output["restored"].get(year, {})
              for kind, entry in sorted(year_entry["databases"].items()):
                  restored_path = Path(restored_year.get(kind, ""))
                  if not restored_path.is_file():
                      raise SystemExit(f"Restore output missing database for {year}/{kind}: {restored_path}")
                  verified[year][kind] = {
                      "filename": entry["database_filename"],
                      "size_bytes": entry["database_size_bytes"],
                      "sha256": entry["database_sha256"],
                      "compressed_sha256": entry["compressed_sha256"],
                      "part_count": len(entry["parts"]),
                      "part_sha256_verified": True,
                      "compressed_sha256_verified": True,
                      "database_size_verified": True,
                      "database_sha256_verified": True,
                      "quick_check": "ok",
                      "integrity_check": "ok",
                      "foreign_key_errors": 0,
                      "restored_path": str(restored_path),
                  }

          report = {
              "format_version": 1,
              "status": "pass",
              "verified_at_utc": dt.datetime.now(dt.timezone.utc).isoformat(),
              "repository": "mohamadeidy/MoeBot_Project",
              "release_tag": registry["release_tag"],
              "lineage": registry["lineage"],
              "method": "Fresh GitHub-hosted runner downloaded every public Release part and download_and_restore_databases.py enforced part SHA-256, ordered reassembly, compressed SHA-256, zstd decompression, database byte size, database SHA-256, SQLite quick_check, integrity_check, and foreign_key_check before returning success.",
              "databases": verified,
          }
          out = Path("MoeBot_Trading_System/Data_Vault/registry/CLEAN_ROOM_VERIFICATION.json")
          out.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - name: Commit clean-room verification report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MoeBot_Trading_System/Data_Vault/registry/CLEAN_ROOM_VERIFICATION.json
          if ! git diff --cached --quiet; then
            git commit -m "Publish MoeBot SQLite clean-room verification"
            git push origin main
          fi

      - name: Remove restored databases
        if: always()
        run: rm -rf "$RUNNER_TEMP/moebot-clean-room" || true
