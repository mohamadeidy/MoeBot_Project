name: MoeBot Diagnose Groups 2-6 REQUIRED_FILES

"on":
  pull_request:
    branches: [main]
    paths:
      - "MoeBot_Trading_System/Group_8/TRIGGER_DEPENDENCY_INTAKE.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || 'main' }}
          fetch-depth: 0

      - name: Diagnose archive packs
        run: |
          python - <<'PY'
          from __future__ import annotations
          import base64, hashlib, json, tarfile, tempfile, traceback
          from pathlib import Path

          root = Path.cwd()
          expected = {
              "group2": ("moebot_group2_engine_v0_2_1.py", "3d83dd19d36e790a71d4ee84db98c38eaf112ec4d9b0de88e54480f315173926"),
              "group3": ("moebot_group3_structure_engine_v0_1_1.py", "8a44667aa6ca7b683c334223ccce011fdc9c5e1112a9c104a4a83d721531d512"),
              "group4": ("moebot_group4_zones_engine_v0_1_6.py", "744aa2bdc48b74bdf462353819569bb9947085623b5bdf3f77dae76e7fb2a4ad"),
              "group5": ("moebot_group5_liquidity_engine_v0_1_6.py", "97a062e465f5c488519b76cb84cd6596d9b665f16d3c95c59747d569b5a758bc"),
              "group6": ("moebot_group6_engine.py", "1a60e9943e91af656dfb9d698ae9b15aac185b173fceb60c5d72bb4b2114f877"),
          }
          packs = {
              "group2_pack": (root/"MoeBot_Trading_System/Group_2/archive", "Group_2_REQUIRED_FILES.tar.gz.b64.part-", ["group2"]),
              "group3_pack": (root/"MoeBot_Trading_System/Group_3/archive", "Group_3_REQUIRED_FILES.tar.gz.b64.part-", ["group3"]),
              "group4_pack": (root/"MoeBot_Trading_System/Group_4/archive", "Group_4_REQUIRED_FILES.tar.gz.b64.part-", ["group4"]),
              "group5_pack": (root/"MoeBot_Trading_System/Group_5/archive", "Group_5_REQUIRED_FILES.tar.gz.b64.part-", ["group5"]),
              "group6_pack": (root/"MoeBot_Trading_System/Group_6/archive", "Group_6_REQUIRED_FILES.tar.gz.b64.part-", ["group6"]),
              "groups2_5_shared_pack": (root/"MoeBot_Trading_System/Groups_2_5_Shared/archive", "Groups_2_5_Shared_REQUIRED_FILES.tar.gz.b64.part-", ["group2","group3","group4","group5"]),
          }

          BASE64_BYTES = set(b"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/=\r\n\t ")

          def clean_payload(raw: bytes) -> bytes:
              raw = raw.strip()
              # Preserve only legal Base64 characters/whitespace; record removals separately.
              return bytes(b for b in raw if b in BASE64_BYTES).replace(b"\r", b"").replace(b"\n", b"").replace(b"\t", b"").replace(b" ", b"")

          report = {"format_version": 2, "packs": {}}
          with tempfile.TemporaryDirectory() as td:
              temp = Path(td)
              for pack_name, (adir, prefix, target_groups) in packs.items():
                  rec = {"archive_dir": str(adir.relative_to(root)), "targets": target_groups}
                  report["packs"][pack_name] = rec
                  try:
                      parts = sorted(adir.glob(prefix + "*"))
                      rec["part_count"] = len(parts)
                      rec["parts"] = []
                      cleaned = []
                      for p in parts:
                          raw = p.read_bytes()
                          c = clean_payload(raw)
                          rec["parts"].append({
                              "name": p.name,
                              "size_bytes": len(raw),
                              "sha256": hashlib.sha256(raw).hexdigest(),
                              "cleaned_size_bytes": len(c),
                              "removed_non_base64_bytes": len(raw.strip()) - len(c),
                              "cleaned_mod4": len(c) % 4,
                              "head": raw[:24].decode("ascii", errors="replace"),
                              "tail": raw[-24:].decode("ascii", errors="replace"),
                          })
                          cleaned.append(c)
                      candidates = []
                      try:
                          candidates.append(("joined_cleaned", base64.b64decode(b"".join(cleaned), validate=True)))
                      except Exception as exc:
                          rec["joined_cleaned_error"] = repr(exc)
                      try:
                          candidates.append(("independent_cleaned", b"".join(base64.b64decode(x, validate=True) for x in cleaned)))
                      except Exception as exc:
                          rec["independent_cleaned_error"] = repr(exc)
                      rec["decode_candidates"] = []
                      any_match = False
                      for mode, data in candidates:
                          cand = {"mode": mode, "size_bytes": len(data), "sha256": hashlib.sha256(data).hexdigest(), "gzip_magic": data[:2].hex()}
                          rec["decode_candidates"].append(cand)
                          archive = temp / f"{pack_name}_{mode}.tar.gz"
                          archive.write_bytes(data)
                          edir = temp / f"{pack_name}_{mode}_extract"
                          edir.mkdir(exist_ok=True)
                          try:
                              with tarfile.open(archive, "r:gz") as tf:
                                  names = tf.getnames()
                                  cand["tar_open"] = "PASS"
                                  cand["tar_names"] = names[:300]
                                  tf.extractall(edir)
                              cand["targets"] = {}
                              for group in target_groups:
                                  filename, exp_sha = expected[group]
                                  matches = list(edir.rglob(filename))
                                  info = {"filename_matches": [str(p.relative_to(edir)) for p in matches]}
                                  if len(matches) == 1:
                                      raw = matches[0].read_bytes()
                                      info.update({"source_size_bytes": len(raw), "source_sha256": hashlib.sha256(raw).hexdigest()})
                                      info["source_match"] = info["source_sha256"] == exp_sha
                                      any_match = any_match or info["source_match"]
                                  cand["targets"][group] = info
                          except Exception as exc:
                              cand["tar_error"] = repr(exc)
                      rec["status"] = "HAS_EXACT_MATCH" if any_match else "NO_EXACT_MATCH"
                  except Exception as exc:
                      rec["status"] = "FAIL"
                      rec["fatal_error"] = repr(exc)
                      rec["traceback"] = traceback.format_exc()
          report["exact_matches"] = {}
          for group, (filename, exp_sha) in expected.items():
              hits = []
              for pack, rec in report["packs"].items():
                  for cand in rec.get("decode_candidates", []):
                      info = cand.get("targets", {}).get(group, {})
                      if info.get("source_match"):
                          hits.append({"pack": pack, "mode": cand["mode"], "path": info["filename_matches"][0], "sha256": info["source_sha256"], "size_bytes": info["source_size_bytes"]})
              report["exact_matches"][group] = hits
          report["verdict"] = "PASS" if all(report["exact_matches"][g] for g in expected) else "FAIL"
          out = root / "MoeBot_Trading_System/Group_8/reports/00_REQUIRED_FILES_ARCHIVE_DIAGNOSTIC.json"
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(report, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          print(json.dumps(report, indent=2, sort_keys=True))
          PY

      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: groups2-6-required-files-diagnostic
          path: MoeBot_Trading_System/Group_8/reports/00_REQUIRED_FILES_ARCHIVE_DIAGNOSTIC.json
          retention-days: 7
